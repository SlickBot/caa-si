# Default (placeholder) values used by the secrets-gradle-plugin when a key is
# missing from local.properties. This file is committed so the project builds
# out of the box. To see Google Maps tiles, put your own key in local.properties:
#
#   MAPS_API_KEY=AIza...your-key...
#
# Get a key at https://developers.google.com/maps/documentation/android-sdk/get-api-key
MAPS_API_KEY=YOUR_KEY_HERE
