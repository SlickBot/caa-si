name: Tests

on:
  workflow_call:
    inputs:
      gradle-args:
        description: Gradle arguments for the test invocation.
        type: string
        default: 'test'
      artifact-name:
        description: Name of the uploaded test-report artifact.
        type: string
        default: 'test-reports'

permissions:
  contents: read

jobs:
  test:
    name: Gradle tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up build environment
        uses: ./.github/actions/setup

      - name: Run tests
        run: ./gradlew ${{ inputs.gradle-args }} --stacktrace

      - name: Upload test reports
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: app/build/reports/tests/
          if-no-files-found: ignore
          retention-days: 14
