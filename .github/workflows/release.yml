name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write   # needed to create the GitHub Release

jobs:
  release:
    name: Build signed release & publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Inject Maps API key
        env:
          MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}
        run: echo "MAPS_API_KEY=${MAPS_API_KEY}" >> local.properties

      - name: Decode keystore
        run: |
          printf '%s' "${{ secrets.KEYSTORE_BASE64 }}" | tr -d '[:space:]' | base64 -d > "${{ github.workspace }}/app/release-key.jks"

      - name: Build signed release & debug APKs
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/app/release-key.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease :app:assembleDebug --stacktrace

      - name: Remove keystore
        if: always()
        run: rm -f "${{ github.workspace }}/app/release-key.jks"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: CaaSI ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/debug/*.apk
          fail_on_unmatched_files: true
