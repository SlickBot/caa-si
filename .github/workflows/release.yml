name: Release

on:
  push:
    tags:
      - 'v*'

# Needed to create the GitHub Release and upload APK assets.
permissions:
  contents: write

# Serialize releases per tag; never cancel publishing in progress.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build signed release & publish
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for generated release notes

      - name: Set up build environment
        uses: ./.github/actions/setup

      - name: Decode keystore
        run: |
          printf '%s' "${{ secrets.KEYSTORE_BASE64 }}" | tr -d '[:space:]' | base64 -d > "${{ runner.temp }}/release-key.jks"

      - name: Build signed release & debug APKs
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/release-key.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease :app:assembleDebug --stacktrace

      - name: Remove keystore
        if: always()
        run: rm -f "${{ runner.temp }}/release-key.jks"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: CaaSI ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/debug/*.apk
          fail_on_unmatched_files: true
