name: Live tests

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: live-tests
  cancel-in-progress: false

jobs:
  live:
    name: Live web-source tests
    uses: ./.github/workflows/test.yml
    with:
      gradle-args: test -PliveTests
      artifact-name: live-test-reports
